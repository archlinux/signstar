[package]
authors.workspace = true
description = "Integration for YubiHSM2 devices as Signstar backend"
edition.workspace = true
homepage.workspace = true
license.workspace = true
name = "signstar-yubihsm2"
readme = "README.md"
repository.workspace = true
rust-version.workspace = true
version = "0.1.0"

[dependencies]
clap = { workspace = true, optional = true }
env_logger = "0.11.8"
log.workspace = true
serde = { workspace = true, features = ["derive"], optional = true }
serde_json = "1.0.145"
signstar-crypto.workspace = true
thiserror.workspace = true
yubihsm = { version = "0.42.1", features = ["mockhsm", "usb"] }

[dev-dependencies]
testresult.workspace = true

[features]
cli = ["dep:clap"]
default = ["serde"]
serde = ["dep:serde"]

[lints]
workspace = true

[[bin]]
name = "signstar-yubihsm"
path = "src/main.rs"
required-features = ["cli"]
