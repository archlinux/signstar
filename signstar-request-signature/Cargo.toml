[package]
name = "signstar-request-signature"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0 OR MIT"

[dependencies]
anyhow = "1.0.93"
async-trait = "0.1.83"
base64 = "0.22.1"
clap = { version = "4.5.21", features = ["derive", "env"] }
env_logger = "0.11.5"
log = "0.4.22"
rand = "0.8.5"
russh = "0.46.0"
russh-keys = "0.46.0"
semver = { version = "1.0.23", features = ["serde"] }
serde = { version = "1.0.208", features = ["derive"] }
serde_json = "1.0.125"
sha2 = "0.11.0-pre.4"
shell-escape = "0.1.5"
ssh-key = "0.6.7"
thiserror = "1.0.64"
tokio = { version = "1.41.1", features = ["full"] }

[dev-dependencies]
rstest.workspace = true
testresult = "0.4.1"
# old version of the sha2 crate used for backwards-compat tests
#old_sha2 = { package = "sha2", version = "=0.11.0-pre.1" }
