[package]
authors.workspace = true
description = "Library and executable for creating, reading and writing of signing requests for files"
edition.workspace = true
homepage.workspace = true
keywords = ["signature", "hsm", "nethsm", "signing", "signstar"]
license.workspace = true
name = "signstar-request-signature"
repository.workspace = true
version = "0.1.0"

[dependencies]
clap.workspace = true
rand.workspace = true
anyhow = "1.0.93"
async-trait = "0.1.83"
base64 = "0.22.1"
env_logger = "0.11.5"
log = "0.4.22"
russh = "0.46.0"
russh-keys = "0.46.0"
semver = { version = "1.0.23", features = ["serde"] }
serde.workspace = true
serde_json = "1.0.125"
sha2.workspace = true
thiserror.workspace = true
ssh-key = "0.6.7"
tokio = { version = "1.41.1", features = ["full"] }

[dev-dependencies]
rstest.workspace = true
testresult.workspace = true
# old version of the sha2 crate used for backwards-compat tests
#old_sha2 = { package = "sha2", version = "=0.11.0-pre.4", features = ["oid"] }
